<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Page</title>
    <link rel="stylesheet" href="../styles/game.css">
</head>
<body>
    <div class="gameImageContainer">
        <img src="../assets/game-image-placeholder.jpg" alt="Game Image">
    </div>

    <div class="gameInfoContainer">
        <h1>Game Title</h1>
        <p class="platform">Console / Console / Console</p>
        
        <div class="releaseDateContainer">
            <h2>Release Date</h2>
            <h2>MM/DD/YYYY</h2>
        </div>

        <div class="scoreContainer">
            <h2>Average Score</h2>
            <div class="scoreBox">
                <p>67</p>
            </div>
        </div>
    </div>

    <div class="addReviewContainer">
        <h2>My Score</h2>
        <div class="slider">
            <input type="range" min="0" max="10" value="5" class="sliderInput">
            <div class="sliderValue">5</div>
        </div>
        <div class="reviewBtnContainer">
            <button>Add my Review</button>
        </div>
    </div>
    
    <div class="reviewsContainer">
        <div class="reviewHeader">
            Search Reviews
        </div>

        <div class="review">
            <div class="scoreBox">
                <p>9.0</p>
            </div>
            <h3>Reviewer Name</h3>
            <p>Review text goes here. This is a sample review to demonstrate the layout of the reviews section.</p>
            <button class="readMoreBtn">Read More</button>
        </div>

        <div class="pagination">
            <button><<</button>
            <button><-</button>
            <button>1</button>
            <button>2</button>
            <button>-></button>
            <button>>></button>
        </div>
    </div>
</body>
